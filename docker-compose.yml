version: '3.8'

services:
  myboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
    volumes:
      # Persist the SQLite database across restarts
      - myboard_data:/app/data
    restart: unless-stopped

volumes:
  myboard_data:
