version: '3.8'

services:
  myboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Soft monthly per-user cap on AI spend, in EUR. Default 4.
      - AI_BUDGET_EUR_PER_MONTH=${AI_BUDGET_EUR_PER_MONTH:-4}
      # ── Stripe (see README §Paywall). Leave blank to disable paywall.
      - APP_URL=${APP_URL:-http://localhost:3000}
      - STRIPE_MODE=${STRIPE_MODE:-test}
      - STRIPE_SECRET_KEY_TEST=${STRIPE_SECRET_KEY_TEST:-}
      - STRIPE_PUBLISHABLE_KEY_TEST=${STRIPE_PUBLISHABLE_KEY_TEST:-}
      - STRIPE_WEBHOOK_SECRET_TEST=${STRIPE_WEBHOOK_SECRET_TEST:-}
      - STRIPE_PRICE_NOK_MONTHLY_TEST=${STRIPE_PRICE_NOK_MONTHLY_TEST:-}
      - STRIPE_PRICE_NOK_SETUP_TEST=${STRIPE_PRICE_NOK_SETUP_TEST:-}
      - STRIPE_PRICE_EUR_MONTHLY_TEST=${STRIPE_PRICE_EUR_MONTHLY_TEST:-}
      - STRIPE_PRICE_EUR_SETUP_TEST=${STRIPE_PRICE_EUR_SETUP_TEST:-}
      - STRIPE_SECRET_KEY_LIVE=${STRIPE_SECRET_KEY_LIVE:-}
      - STRIPE_PUBLISHABLE_KEY_LIVE=${STRIPE_PUBLISHABLE_KEY_LIVE:-}
      - STRIPE_WEBHOOK_SECRET_LIVE=${STRIPE_WEBHOOK_SECRET_LIVE:-}
      - STRIPE_PRICE_NOK_MONTHLY_LIVE=${STRIPE_PRICE_NOK_MONTHLY_LIVE:-}
      - STRIPE_PRICE_NOK_SETUP_LIVE=${STRIPE_PRICE_NOK_SETUP_LIVE:-}
      - STRIPE_PRICE_EUR_MONTHLY_LIVE=${STRIPE_PRICE_EUR_MONTHLY_LIVE:-}
      - STRIPE_PRICE_EUR_SETUP_LIVE=${STRIPE_PRICE_EUR_SETUP_LIVE:-}
    volumes:
      # Persist the SQLite database across restarts
      - myboard_data:/app/data
    restart: unless-stopped

volumes:
  myboard_data:
